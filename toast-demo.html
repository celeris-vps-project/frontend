<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toast 液态玻璃 Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --bg-base: #faf5ff;
    --bg-gradient: linear-gradient(135deg, #fef7ff 0%, #f3e8ff 30%, #fce7f3 60%, #fff1f2 100%);
    --text-primary: #1a1a2e;
    --text-secondary: #64648c;
    --text-muted: #9ca3af;
    --accent: #ff6b9d;
    --accent-light: #ff8cb8;
    --accent-gradient: linear-gradient(135deg, #ff6b9d, #ff8cb8);
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text-primary);
  }

  * { box-sizing: border-box; margin: 0; }

  body {
    min-height: 100vh;
    background: var(--bg-gradient);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 2rem;
  }

  h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
  p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px; }

  .btn-group { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }

  button {
    border: none; border-radius: 12px; padding: 0.65rem 1.2rem;
    font-size: 0.875rem; font-weight: 600; cursor: pointer;
    color: #fff; transition: transform 0.15s, box-shadow 0.2s;
  }
  button:hover { transform: translateY(-1px); }

  .btn-success { background: linear-gradient(135deg, #22c55e, #4ade80); box-shadow: 0 4px 14px rgba(34,197,94,0.3); }
  .btn-error   { background: linear-gradient(135deg, #ef4444, #f87171); box-shadow: 0 4px 14px rgba(239,68,68,0.3); }
  .btn-warning { background: linear-gradient(135deg, #f59e0b, #fbbf24); box-shadow: 0 4px 14px rgba(245,158,11,0.3); color: #1a1a2e; }
  .btn-info    { background: var(--accent-gradient); box-shadow: 0 4px 14px rgba(255,107,157,0.3); }

  .theme-toggle {
    position: fixed; top: 20px; right: 20px;
    background: rgba(0,0,0,0.06); color: var(--text-secondary);
    border-radius: 10px; padding: 0.5rem 1rem; font-size: 0.8rem;
  }

  /* ─── DARK ─── */
  [data-theme="dark"] {
    --bg-base: #0c0c1d;
    --bg-gradient: linear-gradient(135deg, #0c0c1d 0%, #141428 30%, #1a1035 60%, #0f0f20 100%);
    --text-primary: #e2e8f0;
    --text-secondary: rgba(255,255,255,0.6);
    --text-muted: rgba(255,255,255,0.35);
    --accent: #a78bfa;
    --accent-light: #c4b5fd;
    --accent-gradient: linear-gradient(135deg, #8b5cf6, #a78bfa);
    color: var(--text-primary);
    background: var(--bg-gradient);
  }
  [data-theme="dark"] body { background: var(--bg-gradient); }
  [data-theme="dark"] .theme-toggle { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }

  /* ════════════════════════════════════════════
     TOAST STYLES (mirrored from ToastContainer)
     ════════════════════════════════════════════ */
  .toast-container {
    position: fixed; bottom: 24px; right: 24px; z-index: 99999;
    display: flex; flex-direction: column-reverse; gap: 12px;
    pointer-events: none; max-height: calc(100vh - 48px);
  }

  .toast-item {
    position: relative; width: 340px; border-radius: 16px; overflow: hidden;
    pointer-events: auto; cursor: default;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(28px) saturate(200%);
    -webkit-backdrop-filter: blur(28px) saturate(200%);
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04),
                inset 0 1px 0 rgba(255,255,255,0.35), inset 0 -1px 0 rgba(255,255,255,0.1);
    animation: toast-slide-in 0.4s cubic-bezier(0.16,1,0.3,1);
    transition: opacity 0.3s, transform 0.3s;
  }
  .toast-item.removing {
    animation: toast-slide-out 0.3s cubic-bezier(0.4,0,1,1) forwards;
  }

  [data-theme="dark"] .toast-item {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2),
                inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -1px 0 rgba(255,255,255,0.04);
  }

  .toast-shine {
    position: absolute; inset: 0; border-radius: 16px; pointer-events: none; z-index: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.05) 40%, transparent 60%);
  }
  [data-theme="dark"] .toast-shine {
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 40%, transparent 60%);
  }

  .toast-accent-bar {
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px; z-index: 2;
  }
  .bar-success { background: linear-gradient(180deg, #22c55e, #4ade80); }
  .bar-error   { background: linear-gradient(180deg, #ef4444, #f87171); }
  .bar-warning { background: linear-gradient(180deg, #f59e0b, #fbbf24); }
  .bar-info    { background: linear-gradient(180deg, var(--accent), var(--accent-light)); }

  .toast-body {
    position: relative; z-index: 1; display: flex; align-items: flex-start;
    gap: 10px; padding: 14px 16px 14px 20px;
  }

  .toast-icon { flex-shrink: 0; display: flex; align-items: center; margin-top: 1px; }
  .toast-success .toast-icon { color: #22c55e; }
  .toast-error   .toast-icon { color: #ef4444; }
  .toast-warning .toast-icon { color: #f59e0b; }
  .toast-info    .toast-icon { color: var(--accent); }
  [data-theme="dark"] .toast-success .toast-icon { color: #4ade80; }
  [data-theme="dark"] .toast-error   .toast-icon { color: #f87171; }
  [data-theme="dark"] .toast-warning .toast-icon { color: #fbbf24; }
  [data-theme="dark"] .toast-info    .toast-icon { color: var(--accent-light); }

  .toast-message {
    flex: 1; font-size: 0.875rem; font-weight: 500; line-height: 1.45;
    color: var(--text-primary); word-break: break-word;
  }

  .toast-close {
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border: none; border-radius: 8px;
    background: transparent; color: var(--text-muted); cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .toast-close:hover { background: rgba(0,0,0,0.06); color: var(--text-secondary); }
  [data-theme="dark"] .toast-close:hover { background: rgba(255,255,255,0.08); }

  .toast-progress-track {
    position: relative; z-index: 2; height: 3px;
    background: rgba(0,0,0,0.04); overflow: hidden;
  }
  [data-theme="dark"] .toast-progress-track { background: rgba(255,255,255,0.04); }

  .toast-progress-bar {
    height: 100%; width: 100%; transform-origin: left;
    animation: toast-countdown linear forwards; border-radius: 0 3px 3px 0;
  }
  .progress-success { background: linear-gradient(90deg, #22c55e, #4ade80); }
  .progress-error   { background: linear-gradient(90deg, #ef4444, #f87171); }
  .progress-warning { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
  .progress-info    { background: linear-gradient(90deg, var(--accent), var(--accent-light)); }

  @keyframes toast-countdown { from { transform: scaleX(1); } to { transform: scaleX(0); } }
  @keyframes toast-slide-in { from { opacity:0; transform: translateX(100%) scale(0.85); } to { opacity:1; transform: translateX(0) scale(1); } }
  @keyframes toast-slide-out { from { opacity:1; transform: translateX(0) scale(1); } to { opacity:0; transform: translateX(60%) scale(0.9); } }
</style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">🌙 切换主题</button>

  <h1>🧊 液态玻璃 Toast 提示框</h1>
  <p>点击按钮查看右下角的通知效果（hover 暂停倒计时）</p>

  <div class="btn-group">
    <button class="btn-success" onclick="showToast('success','操作成功！数据已保存。')">✅ Success</button>
    <button class="btn-error"   onclick="showToast('error','出现错误，请稍后重试。')">❌ Error</button>
    <button class="btn-warning" onclick="showToast('warning','注意：余额不足，请及时充值。')">⚠️ Warning</button>
    <button class="btn-info"    onclick="showToast('info','系统维护将于今晚 23:00 开始。')">ℹ️ Info</button>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const icons = {
      success: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
      error:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
      warning: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
      info:    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`,
    };

    let toastId = 0;

    function showToast(type, message, duration = 5000) {
      const container = document.getElementById('toastContainer');
      const id = ++toastId;

      const el = document.createElement('div');
      el.className = `toast-item toast-${type}`;
      el.setAttribute('data-id', id);
      el.innerHTML = `
        <div class="toast-shine"></div>
        <div class="toast-accent-bar bar-${type}"></div>
        <div class="toast-body">
          <span class="toast-icon">${icons[type]}</span>
          <span class="toast-message">${message}</span>
          <button class="toast-close" aria-label="Close">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="toast-progress-track">
          <div class="toast-progress-bar progress-${type}" style="animation-duration:${duration}ms"></div>
        </div>
      `;

      // close button
      el.querySelector('.toast-close').addEventListener('click', () => removeToast(el));

      // hover pause
      const bar = el.querySelector('.toast-progress-bar');
      el.addEventListener('mouseenter', () => bar.style.animationPlayState = 'paused');
      el.addEventListener('mouseleave', () => bar.style.animationPlayState = 'running');

      // auto-remove when progress ends
      bar.addEventListener('animationend', () => removeToast(el));

      container.prepend(el);
    }

    function removeToast(el) {
      if (el._removing) return;
      el._removing = true;
      el.classList.add('removing');
      el.addEventListener('animationend', () => el.remove(), { once: true });
    }

    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }
  </script>
</body>
</html>
